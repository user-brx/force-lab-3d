  </g>
  <!-- ação (vermelho) para baixo/esquerda -->
  <g stroke="#FF4D5E" stroke-width="26" stroke-linecap="round" fill="#FF4D5E">
    <line x1="256" y1="256" x2="140" y2="372"/>
    <path d="M140 372 L190 362 L150 322 Z"/>
  </g>
  <!-- normal (verde) para cima -->
  <g stroke="#2DD4A7" stroke-width="20" stroke-linecap="round" fill="#2DD4A7">
    <line x1="180" y1="300" x2="180" y2="200"/>
    <path d="M180 200 L165 232 L195 232 Z"/>
  </g>
  <circle cx="256" cy="256" r="20" fill="#E8EEF7"/>
</svg>
