<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="112" fill="#0E1626"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#27395B" stroke-width="10"/>
